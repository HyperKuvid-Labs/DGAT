<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>(function(){var t=localStorage.getItem('dgat-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examples — DGAT</title>
  <meta name="description" content="Real codebases analysed by DGAT — browse the dependency graph, blueprint, and file tree." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Dark theme (default) ── */
    :root {
      --bg:      #0C0C0C;
      --surface: #111111;
      --raised:  #1A1A1A;
      --border:  #1E1E1E;
      --border2: #2E2E2E;
      --text:    #E8E8E8;
      --muted:   #888888;
      --subtle:  #444444;
      --tag-bg:  #1A1A1A;
      --nav-bg:  rgba(12,12,12,0.88);
      --invert-bg:    #E8E8E8;
      --invert-text:  #0C0C0C;
      --code-bg:  #0A0A0A;
      --code-border: #1E1E1E;
    }
    /* ── Light theme ── */
    html[data-theme="light"] {
      --bg:      #FAFAF9;
      --surface: #FFFFFF;
      --raised:  #F3F3F1;
      --border:  #E9E9E7;
      --border2: #D3D3CD;
      --text:    #1A1A1A;
      --muted:   #6B6B6B;
      --subtle:  #AEAEA9;
      --tag-bg:  #EFEFED;
      --nav-bg:  rgba(250,250,249,0.92);
      --invert-bg:    #1A1A1A;
      --invert-text:  #F8F8F8;
      --code-bg:  #1A1A1A;
      --code-border: #2E2E2E;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 15px; line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::selection { background: rgba(255,255,255,0.12); }
    html[data-theme="light"] ::selection { background: rgba(0,0,0,0.1); }
    h1, h2, h3 { font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: -0.025em; }
    code { font-family: 'JetBrains Mono', monospace; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: 56px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 40px;
      height: 100%; display: flex; align-items: center; gap: 14px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 14px; font-weight: 500;
      text-decoration: none; padding: 5px 10px; border-radius: 6px;
      transition: color 0.12s, background 0.12s;
    }
    .nav-back:hover { color: var(--text); background: var(--raised); }
    .nav-sep { color: var(--border2); user-select: none; }
    .nav-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--text);
    }
    .nav-gh {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 13px; font-weight: 500;
      padding: 5px 12px; border-radius: 6px;
      text-decoration: none; transition: all 0.12s;
    }
    .nav-gh:hover { color: var(--text); border-color: var(--border2); }
    .theme-toggle {
      background: transparent; border: 1px solid var(--border2);
      color: var(--muted); padding: 6px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .theme-toggle:hover { color: var(--text); background: var(--raised); border-color: var(--subtle); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 52px 0 40px;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 40px;
    }
    .page-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--subtle); margin-bottom: 10px;
    }
    h1.page-title {
      font-size: clamp(26px, 3.5vw, 40px); font-weight: 800;
      color: var(--text); margin-bottom: 12px;
    }
    .page-sub { font-size: 15px; color: var(--muted); max-width: 520px; line-height: 1.7; }

    /* ── MAIN ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 44px 40px 80px; }

    /* ── CARDS GRID ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    /* ── REPO CARD ── */
    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .repo-card:hover {
      border-color: var(--border2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    /* image slot */
    .card-image {
      height: 172px; overflow: hidden; position: relative;
      background: var(--raised);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .card-image img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      display: block;
    }
    /* SVG graph placeholder — shown when no image is set */
    .card-graph-svg {
      width: 100%; height: 100%;
    }
    /* striped empty placeholder — shown when placeholder_label is set */
    .card-image-empty {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      background:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 20px 20px; background-color: var(--raised);
    }
    .card-image-empty span {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--subtle); border: 1px dashed var(--border2);
      border-radius: 4px; padding: 3px 9px;
    }
    .card-image svg rect:first-child { fill: var(--raised); }

    /* body */
    .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .card-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.2;
    }
    .card-badges { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }
    .badge {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      padding: 2px 6px; border-radius: 3px;
      background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted);
    }
    .card-model {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--subtle);
    }
    .card-desc { font-size: 13.5px; color: var(--muted); line-height: 1.55; flex: 1; }
    .card-stats {
      display: flex; gap: 14px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .stat { font-size: 12px; color: var(--subtle); display: flex; align-items: baseline; gap: 4px; }
    .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); font-weight: 500; }

    /* footer CTA */
    .card-footer { padding: 0 18px 18px; }
    .card-cta {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--raised); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 13px;
      transition: background 0.12s, border-color 0.12s;
    }
    .repo-card:hover .card-cta { background: var(--tag-bg); border-color: var(--border2); }
    .card-cta-text { font-size: 13px; font-weight: 600; color: var(--text); }
    .card-cta svg { color: var(--muted); }

    /* ── ADD MORE CARD ── */
    .add-card {
      border: 2px dashed var(--border);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 40px 32px;
      color: var(--subtle); min-height: 280px;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-card:hover { border-color: var(--border2); color: var(--muted); }
    .add-icon {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--raised); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .add-card p { font-size: 13px; text-align: center; line-height: 1.6; }
    .add-card code { font-size: 11.5px; color: var(--text); background: var(--tag-bg); padding: 1px 5px; border-radius: 3px; }

    @media (max-width: 700px) {
      .main, .header-inner, .nav-inner { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div class="nav-inner">
    <a href="../" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M13 8H3M7 4L3 8l4 4"/>
      </svg>
      Home
    </a>
    <span class="nav-sep">·</span>
    <span class="nav-title">Examples</span>
    <a href="https://github.com/pradheeppr/dgat" class="nav-gh" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">
      <svg id="theme-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/>
      </svg>
    </button>
  </div>
</nav>

<!-- ── PAGE HEADER ── -->
<div class="page-header">
  <div class="header-inner">
    <div class="page-label">Examples</div>
    <h1 class="page-title">Real codebases, fully mapped</h1>
    <p class="page-sub">Each entry below is a codebase run through DGAT. Browse its dependency graph, architectural blueprint, and file descriptions — all generated locally.</p>
  </div>
</div>

<!-- ── CARDS ── -->
<main class="main">
  <div class="cards" id="cards-grid">
    <!-- cards are rendered from REPOS config below -->
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIGURE YOUR REPOS HERE
//
//  Each entry renders one card.
//
//  Fields:
//   name        — card title  (required)
//   url         — relative path to the DGAT explorer page  (required)
//   description — 1–2 sentence summary  (required)
//   langs       — array of language badge strings  (required)
//   stats       — { nodes, edges }  (required)
//   model       — LLM used for annotations  (optional, shown below name)
//   image       — relative path to a screenshot PNG  (optional)
//               — if omitted, an animated SVG graph is shown instead
//               — set to null to show a striped empty placeholder
// ═══════════════════════════════════════════════════════════════
const REPOS = [
  {
    name:        "dgat — self-analysis",
    url:         "dgat-self",
    description: "DGAT analysing its own source tree. Backend engine, frontend components, library headers — every dependency mapped and described.",
    langs:       ["C++", "TypeScript", "CSS"],
    stats:       { nodes: 27, edges: 44 },
    model:       "Qwen3.5-2B",
    image:       undefined,   // undefined → animated SVG graph; null → striped placeholder; "path.png" → real image
  },

  // ── Add more repos below ────────────────────────────────────
  // {
  //   name:        "my-project",
  //   url:         "my-project/",
  //   description: "Short description of what this project does.",
  //   langs:       ["Python", "Go"],
  //   stats:       { nodes: 120, edges: 310 },
  //   model:       "Qwen3.5-2B",
  //   image:       "my-project-preview.png",
  // },
];
// ═══════════════════════════════════════════════════════════════

// ── SVG graph placeholder (procedural, seeded per card) ───────
function makeSvgGraph(seed, w = 300, h = 172) {
  // deterministic pseudo-random
  let s = seed * 9301 + 49297;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };

  const N = 14 + Math.floor(rand() * 8);
  const nodes = Array.from({ length: N }, (_, i) => {
    const angle = (i / N) * Math.PI * 2 + rand() * 0.6;
    const r = 44 + rand() * 36;
    return {
      x: w / 2 + Math.cos(angle) * r + (rand() - 0.5) * 18,
      y: h / 2 + Math.sin(angle) * r * 0.6 + (rand() - 0.5) * 14,
      radius: 2.8 + rand() * 2.6,
    };
  });

  const edges = [];
  for (let i = 0; i < N; i++) {
    const targets = [(i+1)%N, (i+3)%N, (i + 2 + Math.floor(rand()*4))%N];
    targets.forEach(j => {
      if (i !== j) edges.push([i, j]);
    });
  }

  let edgeSvg = edges.map(([i, j]) =>
    `<line x1="${nodes[i].x.toFixed(1)}" y1="${nodes[i].y.toFixed(1)}" x2="${nodes[j].x.toFixed(1)}" y2="${nodes[j].y.toFixed(1)}" stroke="#D3D3CD" stroke-width="0.8" opacity="0.7"/>`
  ).join('');

  let nodeSvg = nodes.map((n, i) =>
    `<circle cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${n.radius.toFixed(1)}" fill="${i === 0 ? '#1A1A1A' : i < 4 ? '#6B6B6B' : '#AEAEA9'}" opacity="${0.55 + rand()*0.35}" style="animation:node-breathe ${(2.5+rand()*1.5).toFixed(1)}s ease-in-out ${(rand()*1.5).toFixed(2)}s infinite"/>`
  ).join('');

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" class="card-graph-svg">
    <rect width="${w}" height="${h}" fill="#F3F3F1"/>
    <pattern id="gd${seed}" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.7" fill="#D3D3CD" opacity="0.5"/>
      <circle cx="20" cy="0" r="0.7" fill="#D3D3CD" opacity="0.5"/>
      <circle cx="0" cy="20" r="0.7" fill="#D3D3CD" opacity="0.5"/>
      <circle cx="20" cy="20" r="0.7" fill="#D3D3CD" opacity="0.5"/>
    </pattern>
    <rect width="${w}" height="${h}" fill="url(#gd${seed})"/>
    <style>@keyframes node-breathe{0%,100%{opacity:0.9}50%{opacity:0.45}}</style>
    ${edgeSvg}${nodeSvg}
  </svg>`;
}

// ── render cards ──────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cards-grid');

  REPOS.forEach((repo, idx) => {
    const card = document.createElement('a');
    card.href = repo.url;
    card.className = 'repo-card';

    // image slot
    let imageHtml;
    if (typeof repo.image === 'string') {
      imageHtml = `<img src="${repo.image}" alt="${repo.name} preview" onerror="this.parentElement.innerHTML='<div class=\\'card-image-empty\\'><span>image not found</span></div>'"/>`;
    } else if (repo.image === null) {
      imageHtml = `<div class="card-image-empty"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AEAEA9" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>add screenshot</span></div>`;
    } else {
      imageHtml = makeSvgGraph(idx + 1);
    }

    const statsHtml = `
      <div class="stat"><span class="stat-val">${repo.stats.nodes}</span> nodes</div>
      <div class="stat"><span class="stat-val">${repo.stats.edges}</span> edges</div>
      ${repo.langs.length ? `<div class="stat"><span class="stat-val">${repo.langs[0]}</span>${repo.langs[1] ? ` · <span class="stat-val">${repo.langs[1]}</span>` : ''}</div>` : ''}
    `;

    const badgesHtml = repo.langs.map(l => `<span class="badge">${l}</span>`).join('');

    card.innerHTML = `
      <div class="card-image">${imageHtml}</div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-name">${repo.name}</div>
            ${repo.model ? `<div class="card-model">✦ ${repo.model}</div>` : ''}
          </div>
          <div class="card-badges">${badgesHtml}</div>
        </div>
        <p class="card-desc">${repo.description}</p>
        <div class="card-stats">${statsHtml}</div>
      </div>
      <div class="card-footer">
        <div class="card-cta">
          <span class="card-cta-text">Open in DGAT explorer</span>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  // "Add more" card
  const add = document.createElement('div');
  add.className = 'add-card';
  add.innerHTML = `
    <div class="add-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </div>
    <p>Run <code>dgat /your/repo</code> and add the exported page here.<br>Then add an entry to the <code>REPOS</code> config.</p>
  `;
  grid.appendChild(add);
}

renderCards();

const MOON = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.6" fill="none"/>';
const SUN  = '<circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.6"/>';

function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-icon').innerHTML = isDark ? MOON : SUN;
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('dgat-theme', next);
  updateThemeIcon();
}
updateThemeIcon();
</script>
</body>
</html>
