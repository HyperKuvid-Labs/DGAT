<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>(function(){var t=localStorage.getItem('dgat-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dgat — self-analysis — DGAT Examples</title>
  <meta name="description" content="DGAT analysing its own source tree. Backend engine, frontend components, library headers — every dependency mapped and described." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0C0C0C;
      --surface: #111111;
      --raised:  #1A1A1A;
      --border:  #1E1E1E;
      --border2: #2E2E2E;
      --text:    #E8E8E8;
      --muted:   #888888;
      --subtle:  #444444;
      --tag-bg:  #1A1A1A;
      --nav-bg:  rgba(12,12,12,0.88);
    }
    html[data-theme="light"] {
      --bg:      #FAFAF9;
      --surface: #FFFFFF;
      --raised:  #F3F3F1;
      --border:  #E9E9E7;
      --border2: #D3D3CD;
      --text:    #1A1A1A;
      --muted:   #6B6B6B;
      --subtle:  #AEAEA9;
      --tag-bg:  #EFEFED;
      --nav-bg:  rgba(250,250,249,0.92);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 15px; line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::selection { background: rgba(255,255,255,0.12); }
    html[data-theme="light"] ::selection { background: rgba(0,0,0,0.1); }
    h1, h2, h3 { font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: -0.025em; }
    code { font-family: 'JetBrains Mono', monospace; }

    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: 56px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1400px; margin: 0 auto; padding: 0 40px;
      height: 100%; display: flex; align-items: center; gap: 14px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 14px; font-weight: 500;
      text-decoration: none; padding: 5px 10px; border-radius: 6px;
      transition: color 0.12s, background 0.12s;
    }
    .nav-back:hover { color: var(--text); background: var(--raised); }
    .nav-sep { color: var(--border2); user-select: none; }
    .nav-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--text);
    }

    /* Main layout */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 40px 60px;
    }

    /* Repo Header Card */
    .repo-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .repo-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 16px;
    }
    .repo-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 28px; font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }
    .repo-links {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .repo-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.12s;
    }
    .repo-link:hover {
      color: var(--text);
      border-color: var(--border2);
      background: var(--tag-bg);
    }
    .repo-link svg {
      width: 16px;
      height: 16px;
    }
    .repo-desc {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 800px;
      margin-bottom: 20px;
    }
    .repo-stats {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .stat-badge.model {
      background: rgba(79, 142, 247, 0.1);
      border-color: rgba(79, 142, 247, 0.2);
      color: #4F8EF7;
    }

    /* DGAT Canvas Window */
    .dgat-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }
    .dgat-window-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--raised);
      border-bottom: 1px solid var(--border);
    }
    .dgat-window-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .dgat-window-dot.red { background: #FF5F57; }
    .dgat-window-dot.yellow { background: #FEBC2E; }
    .dgat-window-dot.green { background: #28C840; }
    .dgat-window-title {
      margin-left: 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }
    .dgat-iframe {
      width: 100%;
      height: calc(100vh - 280px);
      min-height: 600px;
      border: none;
      display: block;
      background: #0c0c0c;
    }

    @media (max-width: 800px) {
      .main, .nav-inner { padding-left: 24px; padding-right: 24px; }
      .repo-header-top { flex-direction: column; }
      .repo-links { width: 100%; }
      .repo-links a { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-inner">
    <a href="./" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M13 8H3M7 4L3 8l4 4"/>
      </svg>
      Examples
    </a>
    <span class="nav-sep">·</span>
    <span class="nav-title">dgat — self-analysis</span>
  </div>
</nav>

<!-- Main -->
<main class="main">
  <!-- Repo Header -->
  <div class="repo-header">
    <div class="repo-header-top">
      <h1 class="repo-name">dgat — self-analysis</h1>
      <div class="repo-links">
        <a href="https://github.com/pradheeppr/dgat" class="repo-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub
        </a>
      </div>
    </div>
    <p class="repo-desc">DGAT analysing its own source tree. Backend engine, frontend components, library headers — every dependency mapped and described.</p>
    <div class="repo-stats">
      <div class="stat-item">
        <span class="stat-label">Nodes</span>
        <span class="stat-value">27</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Edges</span>
        <span class="stat-value">44</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Languages</span>
        <span class="stat-badge">C++</span>
        <span class="stat-badge">TypeScript</span>
        <span class="stat-badge">CSS</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Model</span>
        <span class="stat-badge model">Qwen3.5-2B</span>
      </div>
    </div>
  </div>

  <!-- DGAT Canvas -->
  <div class="dgat-window">
    <div class="dgat-window-bar">
      <span class="dgat-window-dot red"></span>
      <span class="dgat-window-dot yellow"></span>
      <span class="dgat-window-dot green"></span>
      <span class="dgat-window-title">DGAT Explorer — dgat — self-analysis</span>
    </div>
    <iframe class="dgat-iframe" src="/examples/dgat-self/index.html" title="DGAT Explorer"></iframe>
  </div>
</main>

</body>
</html>
