name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: macos-x86_64
          - os: macos-latest
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libxxhash-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake openssl xxhash

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake openssl --timeout=600

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DENABLE_TREE_SITTER=OFF
          cmake --build . --parallel

      - name: Get artifact name
        id: artifact
        run: |
          TARGET=${{ matrix.target }}
          if [ "$TARGET" = "windows-x86_64" ]; then
            echo "name=dgat-windows-x86_64.exe" >> $GITHUB_OUTPUT
          else
            echo "name=dgat-${{ matrix.target }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build/dgat*
          if-no-files-found: error
